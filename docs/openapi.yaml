openapi: 3.0.3
info:
	title: saas_gangsta Backend API
	description: API documentation for saas_gangsta service.
	version: 0.1.0
servers:
	- url: http://localhost:8080
		description: Local Development
paths:
	/health:
		get:
			tags: [System]
			summary: Service health check
			description: Returns API process health without checking external dependencies.
			responses:
				'200':
					description: Service healthy
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/SuccessResponse'
	/ready:
		get:
			tags: [System]
			summary: Service readiness check
			description: Verifies PostgreSQL and Redis readiness.
			responses:
				'200':
					description: Service is ready
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/SuccessResponse'
				'500':
					description: Dependency not ready
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
	/api/v1/health:
		get:
			tags: [System]
			summary: API v1 health check
			responses:
				'200':
					description: API v1 healthy
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/SuccessResponse'
	/api/v1/ready:
		get:
			tags: [System]
			summary: API v1 readiness check
			responses:
				'200':
					description: API v1 ready
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/SuccessResponse'
				'500':
					description: Dependency not ready
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
components:
	schemas:
		SuccessResponse:
			type: object
			properties:
				success:
					type: boolean
					example: true
				message:
					type: string
					example: Service is healthy
				data:
					type: object
					properties:
						status:
							type: string
							example: ok
						service:
							type: string
							example: saas_gangsta
						timestamp:
							type: string
							format: date-time
							example: 2026-04-16T11:30:00Z
		ErrorResponse:
			type: object
			properties:
				success:
					type: boolean
					example: false
				message:
					type: string
					example: Database is not ready
				error:
					type: object
					properties:
						code:
							type: string
							example: INTERNAL_ERROR
