      security:
      - BearerAuth: []
      summary: Update Category
      tags:
      - Category Management
  /categories/{id}/toggle-active:
    patch:
      consumes:
      - application/json
      description: Ubah status is_active category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
